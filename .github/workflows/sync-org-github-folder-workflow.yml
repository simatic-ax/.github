name: Sync github folder

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-github-folder:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source (.github)
        uses: actions/checkout@v4

      - name: Checkout target (.github-private)
        uses: actions/checkout@v4
        with:
          repository: simatic-ax/.github-private
          token: ${{ secrets.SB_PAT_RW_TOKEN }}
          path: target

      - name: Sync all files (excluding workflows folder)
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='workflows/' \
            --exclude='target/' \
            . target/

      - name: Commit & push
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet || git commit -m "Sync profile README from .github"
          git push
